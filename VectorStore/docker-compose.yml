version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: walhalla-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - VectorStore__Path=/data
      - ApiKey=walhalla-dev-key
    volumes:
      - walhalla-data:/data
    networks:
      - walhalla-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --header='X-API-Key: walhalla-dev-key' http://localhost:5000/api/stats > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ui:
    build:
      context: ./Walhalla.VectorStore.UI
      dockerfile: Dockerfile
    container_name: walhalla-ui
    ports:
      - "80:80"
    environment:
      - API_URL=http://api:5000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - walhalla-net
    restart: unless-stopped

volumes:
  walhalla-data:
    driver: local

networks:
  walhalla-net:
    driver: bridge
